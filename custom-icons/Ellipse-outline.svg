<svg width="78" height="78" viewBox="0 0 78 78" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- White glow -->
<ellipse cx="39" cy="39" rx="29" ry="19" stroke="white" stroke-width="9"/>
<!-- Teal thick border stroke (outline mode = no fill) -->
<ellipse cx="39" cy="39" rx="29" ry="19" stroke="#00ACC1" stroke-width="9"/>
<!-- White inner fill to show hollow center -->
<ellipse cx="39" cy="39" rx="24" ry="14" fill="white"/>
<!-- Subtle inner shadow -->
<ellipse cx="39" cy="39" rx="24" ry="14" fill="rgba(0,0,0,0.06)"/>
<!-- Black outline -->
<ellipse cx="39" cy="39" rx="29" ry="19" stroke="black" stroke-width="3"/>
<!-- Inner edge line -->
<ellipse cx="39" cy="39" rx="24" ry="14" stroke="black" stroke-width="2"/>
</svg>
